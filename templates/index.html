<!DOCTYPE html>
<html>
<head>
    <title>SmartFinance AI</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            text-align: center;
            color: white;
        }
        .card {
            background: white;
            color: black;
            padding: 20px;
            margin: 50px auto;
            width: 60%;
            border-radius: 15px;
        }
        button {
            padding: 10px 20px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 8px;
        }
        img {
            width: 80%;
            margin-top: 20px;
        }
        .error {
            color: red;
        }
    </style>
</head>

<body>

<h1>💼 SmartFinance AI</h1>

<div class="card">

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br><br>
        <button type="submit">Analyze</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    {% if prediction %}
        <h2>📈 Predicted Expense: ₹{{ prediction }}</h2>
        <h3>Total Spending: ₹{{ total }}</h3>
        <h3>Top Category: {{ category }}</h3>

        <img src="{{ url_for('static', filename='chart.png') }}">
        <img src="{{ url_for('static', filename='pie.png') }}">
    {% endif %}

</div>

</body>
</html>
